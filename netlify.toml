[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Migración a dahila.uy ─────────────────────────────────────
# Dominio verificado con SSL activo (confirmado 09/07/2026). Redirige TODO el
# tráfico del subdominio netlify.app al dominio propio con 301 (preserva el
# SEO acumulado y elimina el duplicado que hoy ve Google: ambos dominios
# servían 200 OK con el mismo contenido). Runbook completo en README.md
# § "Migración a dahila.uy (dominio ya comprado — runbook v1.0)".

[[redirects]]
  from = "https://dahila-crochet.netlify.app/*"
  to = "https://dahila.uy/:splat"
  status = 301
  force = true
