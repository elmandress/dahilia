<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 26px 28px; }
  .row { display:flex; align-items:center; gap: 14px; margin-bottom: 8px; }
  .name { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--ink-500); width: 56px; }
  .px { font-family: var(--font-sans); font-size: 11px; color: var(--ink-500); width: 36px; text-align:right; }
  .bar { height: 14px; background: linear-gradient(90deg, var(--rose-300), var(--rose-200)); border-radius: 7px; box-shadow: var(--shadow-xs); }
</style>
</head>
<body>
  <div class="row"><div class="name">space-1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
  <div class="row"><div class="name">space-2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="name">space-3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
  <div class="row"><div class="name">space-4</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="name">space-5</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="name">space-6</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
  <div class="row"><div class="name">space-7</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
  <div class="row"><div class="name">space-8</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
  <div class="row"><div class="name">space-9</div><div class="bar" style="width:96px"></div><div class="px">96</div></div>
</body>
</html>
