<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px; display:grid; grid-template-columns: repeat(3,1fr); gap:12px; }
  .sw {
    height: 80px;
    border-radius: var(--radius-md);
    padding: 12px 14px;
    display: flex; flex-direction: column; justify-content: space-between;
    color: #FFFBF2;
    box-shadow: var(--shadow-xs);
  }
  .sw b { font-family: var(--font-display); font-size: 15px; font-weight: 500; }
  .sw span { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; letter-spacing: 0.04em; opacity:0.8;}
</style>
</head>
<body>
  <div class="sw" style="background:#6B8E5A"><b>Success — Sage</b><span>#6B8E5A · "Encargo confirmado"</span></div>
  <div class="sw" style="background:#C99A3B"><b>Warning — Honey</b><span>#C99A3B · "Quedan 2 lugares"</span></div>
  <div class="sw" style="background:#B6314A"><b>Danger — Raspberry</b><span>#B6314A · "Error al procesar"</span></div>
</body>
</html>
