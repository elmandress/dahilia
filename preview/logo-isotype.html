<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; background: #fff; display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; align-items: end;}
  .cell { display: flex; flex-direction: column; align-items: center; gap: 10px;}
  .cell img { object-fit: contain; }
  .s24 img { width: 24px; height: 24px;}
  .s48 img { width: 48px; height: 48px;}
  .s80 img { width: 80px; height: 80px;}
  .s120 img { width: 120px; height: 120px;}
  .lbl { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--ink-500);}
  .lbl b { display: block; font-family: var(--font-sans); font-weight: 400; color: var(--ink-900); margin-bottom: 1px;}
</style>
</head>
<body>
  <div class="cell s24"><img src="../assets/isotype-color.png"><div class="lbl"><b>24 px</b>favicon</div></div>
  <div class="cell s48"><img src="../assets/isotype-color.png"><div class="lbl"><b>48 px</b>nav</div></div>
  <div class="cell s80"><img src="../assets/isotype-color.png"><div class="lbl"><b>80 px</b>watermark</div></div>
  <div class="cell s120"><img src="../assets/isotype-color.png"><div class="lbl"><b>120 px</b>decorativo</div></div>
</body>
</html>
