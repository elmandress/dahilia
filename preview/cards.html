<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 18px 24px; background: #fff; display:grid; grid-template-columns: 1fr 1fr; gap: 22px;}
  .card { display: flex; flex-direction: column; gap: 10px; cursor: pointer;}
  .img { aspect-ratio: 3/4; border-radius: var(--radius-md); overflow: hidden; background: var(--cream-50); position: relative;}
  .img img { width: 100%; height: 100%; object-fit: cover; display: block;}
  .meta { display: flex; justify-content: space-between; align-items: baseline; padding: 0 2px;}
  .name { font-family: var(--font-display); font-weight: 300; font-size: 17px; color: var(--ink-900); line-height: 1.15;}
  .price { font-family: var(--font-sans); font-weight: 400; font-size: 13px; color: var(--ink-900);}
  .badge { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.92); padding: 4px 10px; font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; border-radius: var(--radius-pill);}
  .alt { background: var(--cream-100); color: var(--ink-900);}
</style>
</head>
<body>
  <div class="card">
    <div class="img">
      <img src="../assets/photos/top-lace-parque.png" alt="">
      <span class="badge">Nuevo</span>
    </div>
    <div class="meta">
      <span class="name">Top Lourdes</span>
      <span class="price">UYU 3.450</span>
    </div>
  </div>
  <div class="card">
    <div class="img">
      <img src="../assets/photos/bolero-marron.png" alt="">
      <span class="badge alt">A medida</span>
    </div>
    <div class="meta">
      <span class="name">Bolero Pétalo</span>
      <span class="price">UYU 4.890</span>
    </div>
  </div>
</body>
</html>
