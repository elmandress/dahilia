<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0; background: #fff;}
  .cell { padding: 22px 18px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; min-height: 220px; box-sizing: border-box;}
  .cell + .cell { border-left: 1px solid var(--border);}
  .white { background: #fff;}
  .cream { background: var(--cream-100);}
  .ink   { background: var(--ink-900);}
  .cell img { height: 100px; width: auto; object-fit: contain;}
  .lbl { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; font-weight: 400;}
  .white .lbl, .cream .lbl { color: var(--ink-500);}
  .ink .lbl { color: var(--cream-100);}
</style>
</head>
<body>
  <div class="cell white">
    <img src="../assets/isotype-color.png" alt="">
    <span class="lbl">Sobre blanco · principal</span>
  </div>
  <div class="cell cream">
    <img src="../assets/isotype-color.png" alt="">
    <span class="lbl">Sobre crema · OK</span>
  </div>
  <div class="cell ink">
    <img src="../assets/isotype-color.png" alt="">
    <span class="lbl">Sobre tinta · aceptado</span>
  </div>
</body>
</html>
