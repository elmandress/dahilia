<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 36px 24px; background: var(--cream-100); display:grid; grid-template-columns: repeat(4, 1fr); gap: 22px; align-items: center;}
  .item { display:flex; flex-direction:column; align-items:center; gap:14px; }
  .box { background: #fff; border-radius: var(--radius-md); width: 110px; height: 70px;}
  .lbl { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--ink-500); text-align:center;}
  .lbl b { display:block; font-family: var(--font-sans); font-weight: 500; font-size: 11.5px; color: var(--wine-700); letter-spacing: 0.04em; margin-bottom:2px;}
  .xs  { box-shadow: 0 1px 2px rgba(77,29,44,0.06); }
  .sm  { box-shadow: 0 4px 14px -6px rgba(77,29,44,0.10); }
  .md  { box-shadow: 0 14px 34px -16px rgba(77,29,44,0.18); }
  .lg  { box-shadow: 0 30px 60px -24px rgba(77,29,44,0.24); }
</style>
</head>
<body>
  <div class="item"><div class="box xs"></div><div class="lbl"><b>shadow-xs</b>1·2 · 6%</div></div>
  <div class="item"><div class="box sm"></div><div class="lbl"><b>shadow-sm</b>4·14 · 10%</div></div>
  <div class="item"><div class="box md"></div><div class="lbl"><b>shadow-md</b>14·34 · 18%</div></div>
  <div class="item"><div class="box lg"></div><div class="lbl"><b>shadow-lg</b>30·60 · 24%</div></div>
</body>
</html>
