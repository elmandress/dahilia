<!-- @dsCard group="Brand" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: #fff; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0;}
  .cell { padding: 22px 20px; display: flex; flex-direction: column; gap: 12px; min-height: 200px; box-sizing: border-box; justify-content: center;}
  .cell + .cell { border-left: 1px solid var(--border);}
  h5 { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-500); margin: 0; font-weight: 400;}
  p { font-family: var(--font-sans); font-size: 13px; font-weight: 300; line-height: 1.55; color: var(--ink-700); margin: 0;}
  .sample { font-family: var(--font-display); font-weight: 300; font-size: 22px; color: var(--ink-900);}
  .pink-text { color: var(--wine-600);}
  .dot { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-sans); font-size: 12px; color: var(--ink-700); font-weight: 400;}
  .dot::before { content: ""; width: 8px; height: 8px; border-radius: 50%; background: var(--rose-300);}
  .swatch-row { display: flex; gap: 6px; }
  .sw { width: 26px; height: 26px; border-radius: 4px;}
</style>
</head>
<body>
  <div class="cell">
    <h5>Donde sí va el rosa</h5>
    <span class="dot">Badges &amp; etiquetas</span>
    <span class="dot">Hover de links</span>
    <span class="dot">Detalle del logo</span>
    <span class="dot">Iconos seleccionados</span>
  </div>
  <div class="cell">
    <h5>Donde no</h5>
    <p>No es un color de fondo. No llena botones primarios. No se usa para texto largo. Si tenés que mirarlo más de un segundo, no es rosa.</p>
  </div>
  <div class="cell">
    <h5>Rosa en marca</h5>
    <div class="sample">DAHIL<span class="pink-text">A</span></div>
    <div class="swatch-row">
      <div class="sw" style="background: var(--rose-100)"></div>
      <div class="sw" style="background: var(--rose-300)"></div>
      <div class="sw" style="background: var(--wine-600)"></div>
    </div>
  </div>
</body>
</html>
