<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 30px; background: linear-gradient(135deg, var(--cream-100), var(--rose-50)); display:grid; grid-template-columns: 1fr 1fr; gap: 18px; align-items: stretch;}
  .panel {
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    display:flex; flex-direction:column; gap: 8px;
  }
  .glass {
    background: rgba(255,251,242,0.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(143,59,83,0.18);
    box-shadow: 0 14px 34px -16px rgba(77,29,44,0.18);
  }
  .menu {
    background: rgba(110,43,64,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    color: var(--cream-50);
    border: 1px solid rgba(255,251,242,0.2);
    box-shadow: 0 30px 60px -24px rgba(77,29,44,0.4);
  }
  .eyebrow { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--wine-600);}
  .glass .title { font-family: var(--font-display); font-size: 20px; color: var(--wine-700); }
  .glass .body  { font-family: var(--font-serif); font-style: italic; font-size: 14px; color: var(--ink-700); line-height: 1.5;}
  .menu .item { display:flex; align-items:center; justify-content:space-between; padding: 5px 0; font-family: var(--font-sans); font-size: 14px;}
  .menu .item + .item { border-top: 1px solid rgba(255,251,242,0.12);}
  .kbd { font-family: ui-monospace,Menlo,monospace; font-size: 11px; opacity: 0.6;}
  .menu .heading { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.65; margin-bottom: 4px;}
</style>
</head>
<body>
  <div class="panel glass">
    <span class="eyebrow">Glass · cream</span>
    <div class="title">Reservá tu encargo</div>
    <div class="body">Cupos abiertos hasta el 30 de junio.</div>
  </div>
  <div class="panel menu">
    <div class="heading">Mi cuenta</div>
    <div class="item"><span>Mis encargos</span><span class="kbd">⌘1</span></div>
    <div class="item"><span>Lista de deseos</span><span class="kbd">⌘2</span></div>
    <div class="item"><span>Cerrar sesión</span><span class="kbd">⌘Q</span></div>
  </div>
</body>
</html>
