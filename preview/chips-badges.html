<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 26px 28px; background: #fff; display:flex; flex-wrap: wrap; gap: 8px; align-items: center;}
  .chip {
    font-family: var(--font-sans);
    font-size: 12px; font-weight: 400;
    letter-spacing: 0.04em;
    padding: 8px 14px;
    border-radius: var(--radius-pill);
    background: #fff;
    color: var(--ink-700);
    border: 1px solid var(--border-strong);
    cursor: pointer;
    transition: all 140ms cubic-bezier(0.22,0.61,0.36,1);
  }
  .chip:hover { background: var(--cream-50);}
  .chip.on { background: var(--ink-900); color: #fff; border-color: var(--ink-900);}
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--font-sans);
    font-size: 10px; font-weight: 400;
    padding: 5px 10px;
    border-radius: var(--radius-pill);
    letter-spacing: 0.18em; text-transform: uppercase;
  }
  .b-new { background: rgba(255,255,255,0.92); color: var(--ink-900); border: 1px solid var(--border);}
  .b-cream { background: var(--cream-100); color: var(--ink-900);}
  .b-hand { background: var(--ink-900); color: #fff;}
  .b-sold { background: var(--ink-100); color: var(--ink-500);}
  .b-pink { background: var(--rose-100); color: var(--wine-700);}
</style>
</head>
<body>
  <span class="chip on">Todo</span>
  <span class="chip">Tops</span>
  <span class="chip">Vestidos</span>
  <span class="chip">Accesorios</span>
  <span class="chip">A medida</span>
  <span style="width:14px"></span>
  <span class="badge b-new">Nuevo</span>
  <span class="badge b-cream">A medida</span>
  <span class="badge b-hand">Hecho a mano</span>
  <span class="badge b-sold">Agotado</span>
  <span class="badge b-pink">Edición limitada</span>
</body>
</html>
