<!-- @dsCard group="Spacing" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px; display:grid; grid-template-columns: repeat(6, 1fr); gap: 14px; align-items: end;}
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { background: var(--cream-200); border: 1px solid var(--border); box-shadow: var(--shadow-xs); width: 76px; height: 76px;}
  .lbl { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; color: var(--ink-500); text-align:center; }
  .lbl b { display:block; font-family: var(--font-sans); font-weight: 500; font-size: 11px; color: var(--wine-700); letter-spacing: 0.04em;}
</style>
</head>
<body>
  <div class="item"><div class="box" style="border-radius:6px"></div><div class="lbl"><b>xs</b>6 px</div></div>
  <div class="item"><div class="box" style="border-radius:10px"></div><div class="lbl"><b>sm</b>10 px</div></div>
  <div class="item"><div class="box" style="border-radius:14px"></div><div class="lbl"><b>md</b>14 px</div></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><div class="lbl"><b>lg</b>20 px</div></div>
  <div class="item"><div class="box" style="border-radius:28px"></div><div class="lbl"><b>xl</b>28 px</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="lbl"><b>pill</b>full</div></div>
</body>
</html>
