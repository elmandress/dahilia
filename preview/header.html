<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: #fff;}
  .header {
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display:flex; align-items:center; justify-content:space-between; gap: 18px;
  }
  .left { display:flex; align-items:center; gap: 10px;}
  .mark { width: 32px; height: 32px; object-fit: contain; display: block;}
  .name { font-family: var(--font-display); font-weight: 300; font-size: 22px; color: var(--ink-900); letter-spacing: 0.18em;}
  nav { display:flex; gap: 26px;}
  nav a {
    font-family: var(--font-sans); font-size: 13px; color: var(--ink-700);
    text-decoration: none; border: none; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 400;
  }
  nav a.on { color: var(--ink-900);}
  .icons { display:flex; gap: 18px; color: var(--ink-900); font-size: 16px;}
</style>
</head>
<body>
  <header class="header">
    <div class="left">
      <img src="../assets/isotype-color.png" class="mark" alt="">
      <span class="name">DAHILA</span>
    </div>
    <nav>
      <a class="on">Tienda</a>
      <a>Encargos</a>
      <a>Atelier</a>
      <a>Contacto</a>
    </nav>
    <div class="icons">⌕  ♡  ⌃ 0</div>
  </header>
</body>
</html>
