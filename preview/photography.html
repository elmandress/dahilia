<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 14px; background: #fff; display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;}
  .ph {
    aspect-ratio: 3/4;
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--cream-50);
  }
  .ph img { width: 100%; height: 100%; object-fit: cover; display: block;}
</style>
</head>
<body>
  <div class="ph"><img src="../assets/photos/top-lace-parque.png" alt=""></div>
  <div class="ph"><img src="../assets/photos/top-blanco.png" alt=""></div>
  <div class="ph"><img src="../assets/photos/chaleco-marron.jpg" alt=""></div>
  <div class="ph"><img src="../assets/photos/bolero-marron.png" alt=""></div>
  <div class="ph"><img src="../assets/photos/wrap-negro.png" alt=""></div>
  <div class="ph"><img src="../assets/photos/atelier-tejiendo.png" alt=""></div>
</body>
</html>
