<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 24px 28px; background: #fff;}
  table { width:100%; border-collapse: collapse; }
  td { padding: 8px 10px; vertical-align: baseline; font-family: var(--font-sans);}
  .lbl { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-500); width: 90px; font-weight: 400;}
  .meta { font-family: ui-monospace, Menlo, monospace; font-size: 11px; color: var(--ink-500); width: 150px;}
  .sample { color: var(--ink-900); }
</style>
</head>
<body>
  <table>
    <tr><td class="lbl">Display</td><td class="meta">Fraunces · 300</td><td class="sample" style="font-family:var(--font-display); font-weight:300; font-size:32px; line-height:1.1; letter-spacing:-0.02em;">Dahila</td></tr>
    <tr><td class="lbl">Editorial</td><td class="meta">Fraunces · 300 italic</td><td class="sample" style="font-family:var(--font-serif); font-style:italic; font-weight:300; font-size:24px; color:var(--ink-700);">hecho a mano</td></tr>
    <tr><td class="lbl">Body</td><td class="meta">Inter · 300</td><td class="sample" style="font-family:var(--font-sans); font-weight:300; font-size:15px; color:var(--ink-700);">Tejido con lanas naturales del interior.</td></tr>
    <tr><td class="lbl">UI</td><td class="meta">Inter · 400 / 500</td><td class="sample" style="font-family:var(--font-sans); font-weight:500; font-size:13px; color:var(--ink-900);">AÑADIR · UYU 1.890</td></tr>
  </table>
</body>
</html>
