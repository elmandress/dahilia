<!-- @dsCard group="Type" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 28px 32px; background: #fff;}
  .stack { display: grid; gap: 16px; }
  .row { display: grid; grid-template-columns: 100px 1fr; align-items: baseline; gap: 22px; }
  .lbl { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-500); padding-top: 6px; font-weight: 400;}
</style>
</head>
<body>
  <div class="stack">
    <div class="row">
      <div class="lbl">Display 60 · 300</div>
      <div style="font-family:var(--font-display); font-weight:300; font-size:60px; line-height:1.02; letter-spacing:-0.02em; color:var(--ink-900);">Tejido con tiempo</div>
    </div>
    <div class="row">
      <div class="lbl">H2 34 · 300</div>
      <div style="font-family:var(--font-display); font-weight:300; font-size:34px; line-height:1.15; letter-spacing:-0.01em; color:var(--ink-900);">Piezas únicas, a tu medida</div>
    </div>
    <div class="row">
      <div class="lbl">Italic 26 · 300</div>
      <div style="font-family:var(--font-serif); font-style:italic; font-weight:300; font-size:26px; color:var(--ink-700);">una prenda, una historia</div>
    </div>
  </div>
</body>
</html>
