<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; background: #fff; }
  h5 { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-500); margin: 0 0 8px;}
  h5:not(:first-of-type) { margin-top: 14px;}
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .sw {
    height: 50px;
    border-radius: var(--radius-sm);
    padding: 6px 9px;
    display: flex; flex-direction: column; justify-content: flex-end;
    font-size: 10px; font-family: ui-monospace, Menlo, monospace;
  }
  .sw b { font-family: var(--font-sans); font-size: 10.5px; font-weight: 400; letter-spacing: 0;}
</style>
</head>
<body>
  <h5>Tan · marrones</h5>
  <div class="row">
    <div class="sw" style="background:#E6D3AE;color:#3a2a14"><b>tan-100</b>#E6D3AE</div>
    <div class="sw" style="background:#D4B58A;color:#3a2a14"><b>tan-300</b>#D4B58A</div>
    <div class="sw" style="background:#A37B53;color:#fff"><b>tan-500</b>#A37B53</div>
    <div class="sw" style="background:#6B4A2E;color:#fff"><b>tan-700</b>#6B4A2E</div>
    <div class="sw" style="background:#3D2A1A;color:#fff"><b>tan-900</b>#3D2A1A</div>
  </div>
  <h5>Moss · verdes</h5>
  <div class="row">
    <div class="sw" style="background:#DEE6CC;color:#2a3520"><b>moss-100</b>#DEE6CC</div>
    <div class="sw" style="background:#B6C68C;color:#2a3520"><b>moss-300</b>#B6C68C</div>
    <div class="sw" style="background:#6A8456;color:#fff"><b>moss-500</b>#6A8456</div>
    <div class="sw" style="background:#3D4F2F;color:#fff"><b>moss-700</b>#3D4F2F</div>
    <div class="sw" style="background:#0F1A0E;color:#fff"><b>ink (off)</b>#1F1A1B</div>
  </div>
  <h5>Lavender · accent</h5>
  <div class="row">
    <div class="sw" style="background:#EDE5F2;color:#2e2440"><b>lav-100</b>#EDE5F2</div>
    <div class="sw" style="background:#D5C7E0;color:#2e2440"><b>lav-200</b>#D5C7E0</div>
    <div class="sw" style="background:#B8A8C9;color:#2e2440"><b>lav-300</b>#B8A8C9</div>
    <div class="sw" style="background:#6F5C8A;color:#fff"><b>lav-500</b>#6F5C8A</div>
    <div class="sw" style="background:#3B2F52;color:#fff"><b>lav-700</b>#3B2F52</div>
  </div>
</body>
</html>
