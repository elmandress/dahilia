<!-- @dsCard group="Colors" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 22px 24px; background: var(--white); }
  .row { display: grid; grid-template-columns: 1.2fr 1fr 1fr 0.8fr; gap: 12px; }
  .sw {
    border-radius: var(--radius-md);
    height: 110px;
    padding: 14px;
    display: flex; flex-direction: column; justify-content: space-between;
    font-family: var(--font-sans);
  }
  .sw .role { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.7;}
  .sw .name { font-family: var(--font-display); font-weight: 300; font-size: 22px; line-height: 1.1;}
  .sw .hx   { font-family: ui-monospace, Menlo, monospace; font-size: 10.5px; opacity: 0.7;}
  .white  { background: #fff; border: 1px solid var(--ink-300); color: var(--ink-900);}
  .cream  { background: #FAF1DF; color: var(--ink-900);}
  .pink   { background: #E693A7; color: var(--ink-900);}
  .ink    { background: var(--ink-900); color: #fff;}
</style>
</head>
<body>
  <div class="row">
    <div class="sw white"><span class="role">Canvas · principal</span><div><div class="name">Blanco</div><div class="hx">#FFFFFF</div></div></div>
    <div class="sw cream"><span class="role">Recuadros · cards</span><div><div class="name">Crema</div><div class="hx">#FAF1DF</div></div></div>
    <div class="sw pink"><span class="role">Detalles · accent</span><div><div class="name">Rosa</div><div class="hx">#E693A7</div></div></div>
    <div class="sw ink"><span class="role">Texto · marca</span><div><div class="name">Tinta</div><div class="hx">#1F1A1B</div></div></div>
  </div>
</body>
</html>
