<!-- @dsCard group="Components" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
<style>
  body { padding: 26px; display: grid; grid-template-columns: repeat(6, 1fr); gap: 18px; align-items: center; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px;}
  i { font-size: 28px; color: var(--wine-700); }
  .lbl { font-family: var(--font-sans); font-size: 10.5px; color: var(--ink-500); letter-spacing: 0.04em;}
</style>
</head>
<body>
  <div class="cell"><i class="ph-light ph-magnifying-glass"></i><span class="lbl">search</span></div>
  <div class="cell"><i class="ph-light ph-heart"></i><span class="lbl">wishlist</span></div>
  <div class="cell"><i class="ph-light ph-shopping-bag"></i><span class="lbl">cart</span></div>
  <div class="cell"><i class="ph-light ph-user"></i><span class="lbl">account</span></div>
  <div class="cell"><i class="ph-light ph-envelope-simple"></i><span class="lbl">contact</span></div>
  <div class="cell"><i class="ph-light ph-instagram-logo"></i><span class="lbl">instagram</span></div>
  <div class="cell"><i class="ph-light ph-plus"></i><span class="lbl">add</span></div>
  <div class="cell"><i class="ph-light ph-minus"></i><span class="lbl">remove</span></div>
  <div class="cell"><i class="ph-light ph-x"></i><span class="lbl">close</span></div>
  <div class="cell"><i class="ph-light ph-arrow-right"></i><span class="lbl">next</span></div>
  <div class="cell"><i class="ph-light ph-ruler"></i><span class="lbl">size</span></div>
  <div class="cell"><i class="ph-light ph-flower"></i><span class="lbl">collection</span></div>
</body>
</html>
