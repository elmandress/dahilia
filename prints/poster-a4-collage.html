<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Poster A4 — Collage</title>
<link rel="stylesheet" href="_print.css">
<style>
  @page { size: A4 portrait; margin: 0; }
  .sheet {
    width: 210mm; height: 297mm;
    background: #fff;
    padding: 18mm;
    box-sizing: border-box;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 10mm;
  }
  .top { display: flex; justify-content: space-between; align-items: center; }
  .mark { display: flex; align-items: center; gap: 4mm;}
  .mark img { width: 14mm; height: 14mm;}
  .mark .wordmark { font-family: var(--font-display); font-weight: 300; font-size: 18pt; letter-spacing: 0.18em; color: var(--ink-900);}
  .tagline { font-family: var(--font-sans); font-size: 8.5pt; font-weight: 400; letter-spacing: 0.32em; text-transform: uppercase; color: var(--ink-500); text-align: right;}

  .grid {
    display: grid;
    grid-template-columns: 1.2fr 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 4mm;
  }
  .grid img { width: 100%; height: 100%; object-fit: cover; border-radius: 3mm;}
  .grid .big { grid-row: 1 / 3;}

  .text-overlay {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    background: var(--cream-100); border-radius: 3mm;
    padding: 6mm;
  }
  .text-overlay h2 {
    font-family: var(--font-display); font-weight: 300; font-size: 28pt;
    line-height: 0.98; letter-spacing: -0.02em; color: var(--ink-900);
    margin: 0; text-align: center;
  }
  .text-overlay h2 em { font-style: italic; color: var(--wine-700);}

  .bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 6mm; border-top: 1px solid var(--border-strong);
    font-family: var(--font-sans); font-size: 9pt; font-weight: 400;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-700);
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="top">
    <div class="mark">
      <img src="../assets/isotype-color.png" alt="">
      <span class="wordmark">DAHILA</span>
    </div>
    <div class="tagline">Hecho a mano · Montevideo</div>
  </div>

  <div class="grid">
    <img class="big" src="../assets/photos/top-lace-parque.png" alt="">
    <img src="../assets/photos/bolero-marron.png" alt="">
    <div class="text-overlay">
      <h2>Una prenda,<br/><em>una historia.</em></h2>
    </div>
    <img src="../assets/photos/chaleco-marron.jpg" alt="">
    <img src="../assets/photos/bufanda-verde.png" alt="">
  </div>

  <div class="bottom">
    <span>@dahila.crochet</span>
    <span>+598 94 605 015</span>
    <span>dahila.uy</span>
  </div>
</div>
</body>
</html>
