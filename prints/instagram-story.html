<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Instagram story — 1080×1920</title>
<link rel="stylesheet" href="_print.css">
<style>
  .sheet {
    width: 1080px; height: 1920px;
    position: relative;
    background: #fff;
    overflow: hidden;
  }
  .photo { position: absolute; inset: 0; }
  .photo img { width: 100%; height: 100%; object-fit: cover; display: block;}
  .gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0) 0%,
      rgba(0,0,0,0) 40%,
      rgba(0,0,0,0.55) 100%);
  }
  .top {
    position: absolute; top: 80px; left: 80px; right: 80px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .mark { display: flex; align-items: center; gap: 14px;}
  .mark img { width: 60px; height: 60px;
    background: rgba(255,255,255,0.92); border-radius: 50%; padding: 8px;}
  .mark .wordmark {
    font-family: var(--font-display); font-weight: 300; font-size: 30px;
    letter-spacing: 0.18em; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .badge {
    background: rgba(255,255,255,0.92);
    padding: 10px 18px; border-radius: 999px;
    font-family: var(--font-sans); font-size: 14px; font-weight: 400;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-900);
  }
  .bottom {
    position: absolute; bottom: 96px; left: 80px; right: 80px;
    color: #fff;
  }
  h1 {
    font-family: var(--font-display); font-weight: 300;
    font-size: 110px; line-height: 0.92; letter-spacing: -0.025em;
    color: #fff; margin: 0;
  }
  h1 em { font-style: italic;}
  .sub {
    font-family: var(--font-serif); font-style: italic; font-weight: 300;
    font-size: 26px; line-height: 1.4; color: rgba(255,255,255,0.92);
    margin: 28px 0 0; max-width: 580px;
  }
  .cta {
    margin-top: 48px;
    display: inline-flex; align-items: center; gap: 14px;
    background: #fff; color: var(--ink-900);
    padding: 22px 36px; border-radius: 12px;
    font-family: var(--font-sans); font-size: 16px; font-weight: 500;
    letter-spacing: 0.18em; text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="sheet">
  <div class="photo"><img src="../assets/photos/top-blanco.png" alt=""></div>
  <div class="gradient"></div>

  <div class="top">
    <div class="mark">
      <img src="../assets/isotype-color.png" alt="">
      <span class="wordmark">DAHILA</span>
    </div>
    <span class="badge">Otoño 2026</span>
  </div>

  <div class="bottom">
    <h1>Encargos<br/><em>abiertos.</em></h1>
    <p class="sub">Cupos para entrega entre mayo y julio. Escribime y armamos la tuya.</p>
    <div class="cta">
      Tocá para escribir →
    </div>
  </div>
</div>
</body>
</html>
