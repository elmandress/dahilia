<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Poster A4 — Encargos abiertos</title>
<link rel="stylesheet" href="_print.css">
<style>
  @page { size: A4 portrait; margin: 0; }
  .sheet {
    width: 210mm; height: 297mm;
    background: var(--cream-100);
    padding: 22mm 22mm 18mm;
    display: flex; flex-direction: column;
    box-sizing: border-box;
    position: relative;
  }
  .top { display: flex; justify-content: space-between; align-items: flex-start; }
  .mark { display: flex; align-items: center; gap: 5mm; }
  .mark img { width: 18mm; height: 18mm; }
  .mark .wordmark { font-family: var(--font-display); font-weight: 300; font-size: 22pt; letter-spacing: 0.18em; color: var(--ink-900);}
  .meta { font-family: var(--font-sans); font-size: 9pt; font-weight: 400; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-700); text-align: right; line-height: 1.6;}
  .center { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 12mm; }
  .eyebrow { font-family: var(--font-sans); font-size: 10pt; font-weight: 400; letter-spacing: 0.32em; text-transform: uppercase; color: var(--wine-600);}
  h1 { font-family: var(--font-display); font-weight: 300; font-size: 84pt; line-height: 0.95; letter-spacing: -0.025em; color: var(--ink-900); margin: 0;}
  h1 em { font-style: italic; color: var(--wine-700); }
  .lede { font-family: var(--font-serif); font-style: italic; font-weight: 300; font-size: 18pt; line-height: 1.4; color: var(--ink-700); max-width: 130mm; margin: 0;}
  .contact { display: flex; justify-content: space-between; align-items: flex-end; }
  .contact .label { font-family: var(--font-sans); font-size: 8pt; letter-spacing: 0.32em; text-transform: uppercase; color: var(--ink-500); margin-bottom: 2mm;}
  .contact .val { font-family: var(--font-display); font-weight: 300; font-size: 18pt; color: var(--ink-900);}
  .corner-iso { position: absolute; bottom: -10mm; right: -10mm; width: 80mm; opacity: 0.08; }
</style>
</head>
<body>
<div class="sheet">
  <div class="top">
    <div class="mark">
      <img src="../assets/isotype-color.png" alt="">
      <span class="wordmark">DAHILA</span>
    </div>
    <div class="meta">Atelier de crochet<br/>Montevideo · UY</div>
  </div>

  <div class="center">
    <div class="eyebrow">Encargos abiertos</div>
    <h1>Cupos<br/>de <em>otoño.</em></h1>
    <p class="lede">Estoy tomando piezas para entrega entre mayo y julio. Hablamos antes, vos elegís lana y color, y te aviso cuando empiezo.</p>
  </div>

  <div class="contact">
    <div>
      <div class="label">WhatsApp</div>
      <div class="val">+598 94 605 015</div>
    </div>
    <div>
      <div class="label">Instagram</div>
      <div class="val">@dahila.crochet</div>
    </div>
  </div>

  <img class="corner-iso" src="../assets/isotype-color.png" alt="">
</div>
</body>
</html>
